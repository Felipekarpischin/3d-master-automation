name: CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Node.js tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test
